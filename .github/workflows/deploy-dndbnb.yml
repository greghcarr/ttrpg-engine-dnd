name: Deploy dndbnb

# Builds dndbnb/ -> dist-dndbnb/ and pushes the result to a sibling
# `greghcarr/dndbnb` repo's `gh-pages` branch, so the site settles at
# https://greghcarr.github.io/dndbnb/.
#
# Why a separate repo: GitHub Pages serves one site per repo at
# greghcarr.github.io/<repo>. To get the URL `/dndbnb`, the build
# output has to live in a repo named `dndbnb`. We keep the SOURCE here
# (so engine changes auto-reflect in dndbnb), and only push the
# BUILT bundle across.
#
# One-time setup required before this works:
#   1. Create an empty public repo `greghcarr/dndbnb` on GitHub.
#   2. Generate a fine-grained personal access token with:
#        - Repository access: `greghcarr/dndbnb`
#        - Permissions: Contents (read+write), Pages (read+write).
#   3. In this repo's Settings -> Secrets and variables -> Actions,
#      add a secret `DNDBNB_DEPLOY_TOKEN` with the token value.
#   4. In `greghcarr/dndbnb`, Settings -> Pages -> Source = "Deploy
#      from a branch", Branch = `gh-pages` / `/ (root)`.
#
# After that, every push to `main` that touches engine source or
# `dndbnb/` redeploys.

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'dndbnb/**'
      - 'vite.dndbnb.config.ts'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/deploy-dndbnb.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dndbnb-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # CI gate already runs typecheck + tests on every push; this
      # workflow trusts that and goes straight to the engine + dndbnb
      # build steps.
      - name: Build engine library
        run: npm run build
      - name: Build dndbnb
        run: npm run build:dndbnb
        env:
          NODE_ENV: production
      - name: Deploy to greghcarr/dndbnb gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DNDBNB_DEPLOY_TOKEN }}
          external_repository: greghcarr/dndbnb
          publish_branch: gh-pages
          publish_dir: ./dist-dndbnb
          commit_message: "deploy: ${{ github.sha }}"
