name: Deploy web demo

# Builds web/ → dist-web/ and publishes it to GitHub Pages via the
# modern Actions-based flow (no commits to the repo). Per
# docs/web-demo-plan.md ("Implementation notes"), we deviate from the
# plan's "commit docs/ back to main" approach because the repo's
# docs/ directory already holds hand-authored markdown guides; mixing
# build output with hand-written docs would be brittle and risks
# accidentally overwriting reviewed content.
#
# Repo setup required before this works: Settings → Pages → Source =
# "GitHub Actions". One-time, no token, no branch needed.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      # The CI workflow already runs typecheck + tests on every push;
      # this workflow trusts that gate and goes straight to build.
      - name: Build engine library
        run: npm run build
      - name: Build web demo
        run: npm run build:web
        env:
          NODE_ENV: production
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist-web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
