name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # Node 18 reached EOL on 2025-04-30; drop it. Add Node 24 (current)
        # alongside the maintained 20 LTS and 22 LTS lines.
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v5
      - name: Use Node ${{ matrix.node }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test with coverage
        run: npm run test:coverage
      - name: Build
        run: npm run build
